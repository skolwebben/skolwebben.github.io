<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fia med Knuff</title>
    <style>
        :root {
            --red: #FF4136;
            --green: #2ECC40;
            --yellow: #FFDC00;
            --blue: #0074D9;
            --bg-color: #f0f8ff;
            --board-bg: #ffffff;
            --text-dark: #333333;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .game-wrapper {
            display: flex;
            flex-direction: row;
            gap: 30px;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
        }

        .sidebar {
            flex: 1;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .turn-indicator {
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: white;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .dice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .dice {
            font-size: 80px;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            user-select: none;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 3px solid #eee;
            color: #444;
        }

        .dice:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        .dice:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .dice.rolling {
            animation: diceShake 0.3s infinite;
            pointer-events: none;
            color: #888;
        }

        @keyframes diceShake {
            0% { transform: rotate(-15deg) scale(1.05); }
            50% { transform: rotate(15deg) scale(1.05); }
            100% { transform: rotate(-15deg) scale(1.05); }
        }

        .msg-box {
            min-height: 60px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 10px;
            background: #f9f9f9;
            width: 100%;
            box-sizing: border-box;
            border: 2px dashed #ddd;
        }

        .board-container {
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            background-color: var(--board-bg);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            touch-action: none; /* Prevent scrolling when tapping canvas */
        }

        /* Responsive */
        @media (max-width: 768px) {
            .game-wrapper { flex-direction: column; padding: 15px; gap: 15px; }
            .sidebar { min-width: 100%; }
            canvas { width: 100%; max-width: 500px; margin: 0 auto; display: block; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="sidebar">
        <h1>Fia med Knuff</h1>
        <div id="turn-indicator" class="turn-indicator" style="background-color: var(--red);">Röd Spelares Tur</div>
        
        <div class="dice-container">
            <div id="dice" class="dice" onclick="rollDice()">⚀</div>
            <p id="dice-hint" style="margin-top: 10px; font-weight: bold; color: #666;">Klicka för att slå!</p>
        </div>
        
        <div id="msg-box" class="msg-box">Välkommen! Röd börjar.</div>
    </div>
    
    <div class="board-container">
        <canvas id="gameBoard" width="600" height="600"></canvas>
    </div>
</div>

<script>
    // --- Spelinställningar & Konstanter ---
    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const CELL_SIZE = 40;
    const CENTER = {x: 300, y: 300};
    
    // Tärningssymboler Unicode
    const DICE_FACES = ['\u2680', '\u2681', '\u2682', '\u2683', '\u2684', '\u2685'];

    // Banans koordinater (52 rutor i klockans riktning, börjar uppe till vänster)
    const track = [
        {c:0,r:6}, {c:1,r:6}, {c:2,r:6}, {c:3,r:6}, {c:4,r:6}, {c:5,r:6},
        {c:6,r:5}, {c:6,r:4}, {c:6,r:3}, {c:6,r:2}, {c:6,r:1}, {c:6,r:0},
        {c:7,r:0}, {c:8,r:0},
        {c:8,r:1}, {c:8,r:2}, {c:8,r:3}, {c:8,r:4}, {c:8,r:5},
        {c:9,r:6}, {c:10,r:6}, {c:11,r:6}, {c:12,r:6}, {c:13,r:6}, {c:14,r:6},
        {c:14,r:7}, {c:14,r:8},
        {c:13,r:8}, {c:12,r:8}, {c:11,r:8}, {c:10,r:8}, {c:9,r:8},
        {c:8,r:9}, {c:8,r:10}, {c:8,r:11}, {c:8,r:12}, {c:8,r:13}, {c:8,r:14},
        {c:7,r:14}, {c:6,r:14},
        {c:6,r:13}, {c:6,r:12}, {c:6,r:11}, {c:6,r:10}, {c:6,r:9},
        {c:5,r:8}, {c:4,r:8}, {c:3,r:8}, {c:2,r:8}, {c:1,r:8}, {c:0,r:8},
        {c:0,r:7}
    ];

    // Spelardata
    const players = [
        {
            id: 0, name: 'Röd', color: '#FF4136', lightColor: '#ffb3b0', textColor: 'white',
            startOffset: 1, // Startar på track index 1 (c:1, r:6)
            baseArea: { x: 0, y: 0, w: 240, h: 240 },
            baseCoords: [{c:2.25, r:2.25}, {c:3.75, r:2.25}, {c:2.25, r:3.75}, {c:3.75, r:3.75}],
            homePath: [{c:1,r:7}, {c:2,r:7}, {c:3,r:7}, {c:4,r:7}, {c:5,r:7}],
            pieces: [] // Initieras senare
        },
        {
            id: 1, name: 'Grön', color: '#2ECC40', lightColor: '#b0ffbc', textColor: 'white',
            startOffset: 14,
            baseArea: { x: 360, y: 0, w: 240, h: 240 },
            baseCoords: [{c:11.25, r:2.25}, {c:12.75, r:2.25}, {c:11.25, r:3.75}, {c:12.75, r:3.75}],
            homePath: [{c:7,r:1}, {c:7,r:2}, {c:7,r:3}, {c:7,r:4}, {c:7,r:5}],
            pieces: []
        },
        {
            id: 2, name: 'Gul', color: '#FFDC00', lightColor: '#fff2a8', textColor: '#333',
            startOffset: 27,
            baseArea: { x: 360, y: 360, w: 240, h: 240 },
            baseCoords: [{c:11.25, r:11.25}, {c:12.75, r:11.25}, {c:11.25, r:12.75}, {c:12.75, r:12.75}],
            homePath: [{c:13,r:7}, {c:12,r:7}, {c:11,r:7}, {c:10,r:7}, {c:9,r:7}],
            pieces: []
        },
        {
            id: 3, name: 'Blå', color: '#0074D9', lightColor: '#a8d5ff', textColor: 'white',
            startOffset: 40,
            baseArea: { x: 0, y: 360, w: 240, h: 240 },
            baseCoords: [{c:2.25, r:11.25}, {c:3.75, r:11.25}, {c:2.25, r:12.75}, {c:3.75, r:12.75}],
            homePath: [{c:7,r:13}, {c:7,r:12}, {c:7,r:11}, {c:7,r:10}, {c:7,r:9}],
            pieces: []
        }
    ];

    // Spelstatus
    let currentTurn = 0;
    let diceValue = 1;
    let gameState = 'WAITING_FOR_ROLL'; // 'WAITING_FOR_ROLL', 'ROLLING', 'WAITING_FOR_MOVE', 'ANIMATING', 'GAME_OVER'
    let extraTurn = false;

    // Animations variabler
    let animatingPiece = null;
    let activePath = [];
    let pathStep = 0;
    let activePathProgress = [];

    // --- Initialisering ---
    function initGame() {
        // Skapa 4 pjäser per spelare
        players.forEach((p, pIndex) => {
            p.pieces = [];
            for (let i = 0; i < 4; i++) {
                let coords = getRawCoordinates(pIndex, i, 0);
                p.pieces.push({
                    id: i,
                    playerIdx: pIndex,
                    progress: 0, // 0 = Bas, 1-51 = Spelplan, 52-56 = Mållinje, 57 = Mål
                    x: coords.x,
                    y: coords.y,
                    renderX: coords.x,
                    renderY: coords.y
                });
            }
        });
        updateUI();
        requestAnimationFrame(gameLoop);
    }

    // --- Hämta koordinater baserat på framsteg (progress) ---
    function getRawCoordinates(playerIdx, pieceIdx, progress) {
        let p = players[playerIdx];
        if (progress === 0) {
            return { x: p.baseCoords[pieceIdx].c * CELL_SIZE, y: p.baseCoords[pieceIdx].r * CELL_SIZE };
        }
        if (progress >= 1 && progress <= 51) {
            let tIdx = (p.startOffset + progress - 1) % 52;
            return { x: track[tIdx].c * CELL_SIZE + CELL_SIZE/2, y: track[tIdx].r * CELL_SIZE + CELL_SIZE/2 };
        }
        if (progress >= 52 && progress <= 56) {
            let hIdx = progress - 52;
            return { x: p.homePath[hIdx].c * CELL_SIZE + CELL_SIZE/2, y: p.homePath[hIdx].r * CELL_SIZE + CELL_SIZE/2 };
        }
        if (progress === 57) {
            return { x: CENTER.x, y: CENTER.y };
        }
        return {x: 0, y: 0};
    }

    // --- Rituppdateringar ---
    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Rita bas-områden (Färgade rutor)
        players.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.baseArea.x, p.baseArea.y, p.baseArea.w, p.baseArea.h);
            
            // Inre ljusa ruta
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fillRect(p.baseArea.x + 30, p.baseArea.y + 30, p.baseArea.w - 60, p.baseArea.h - 60);

            // Cirklar för startpjäser
            p.baseCoords.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.c * CELL_SIZE, c.r * CELL_SIZE, 18, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = p.color;
                ctx.stroke();
            });
        });

        // 2. Rita spelbanan (Vita rutor med grå kant)
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#ccc';
        track.forEach((cell, idx) => {
            ctx.fillStyle = '#ffffff';
            
            // Färg på start-rutor
            let isStart = false;
            players.forEach(p => {
                if(p.startOffset === idx) {
                    ctx.fillStyle = p.color;
                    isStart = true;
                }
            });

            ctx.fillRect(cell.c * CELL_SIZE, cell.r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            ctx.strokeRect(cell.c * CELL_SIZE, cell.r * CELL_SIZE, CELL_SIZE, CELL_SIZE);

            if(isStart) {
                // Rita en stjärna i mitten
                drawStar(cell.c * CELL_SIZE + 20, cell.r * CELL_SIZE + 20, 5, 10, 4, 'white');
            }
        });

        // 3. Rita Mållinjer (Home paths)
        players.forEach(p => {
            p.homePath.forEach(cell => {
                ctx.fillStyle = p.lightColor;
                ctx.fillRect(cell.c * CELL_SIZE, cell.r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                ctx.strokeRect(cell.c * CELL_SIZE, cell.r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            });
        });

        // 4. Rita Mitten (Mål)
        // Röd triangel (Vänster)
        drawTriangle(300, 300, 240, 240, 240, 360, players[0].color);
        // Grön triangel (Topp)
        drawTriangle(300, 300, 240, 240, 360, 240, players[1].color);
        // Gul triangel (Höger)
        drawTriangle(300, 300, 360, 240, 360, 360, players[2].color);
        // Blå triangel (Botten)
        drawTriangle(300, 300, 240, 360, 360, 360, players[3].color);

        // 5. Hantera och Rita Pjäser
        // Gruppera pjäser som står på samma ruta för att rita dem något förskjutna
        let piecePositions = {}; 
        
        players.forEach(p => {
            p.pieces.forEach(piece => {
                // Sätt render position till faktisk pos
                piece.renderX = piece.x;
                piece.renderY = piece.y;

                if (piece.progress > 0 && piece.progress < 57) {
                    let key = `${piece.progress}_${p.id}`; // Wait, group by absolute position!
                    // Låt oss hitta absolut X, Y 
                    let rawCoords = getRawCoordinates(p.id, piece.id, piece.progress);
                    let coordKey = `${rawCoords.x}_${rawCoords.y}`;
                    
                    if(!piecePositions[coordKey]) piecePositions[coordKey] = [];
                    piecePositions[coordKey].push(piece);
                }
            });
        });

        // Justera position för överlappande
        Object.values(piecePositions).forEach(group => {
            let count = group.length;
            if (count > 1) {
                group.forEach((piece, idx) => {
                    // Förskjut pjäsen lite om flera står på samma ruta
                    if(piece !== animatingPiece) {
                        let offset = (idx - (count-1)/2) * 8;
                        piece.renderX += offset;
                        piece.renderY += offset;
                    }
                });
            }
        });

        // Rita pjäserna
        players.forEach(p => {
            p.pieces.forEach(piece => {
                // Dölj i mål
                if(piece.progress === 57) return; 
                
                let isClickable = gameState === 'WAITING_FOR_MOVE' && p.id === currentTurn && isValidMove(piece);
                
                drawPiece(piece.renderX, piece.renderY, p.color, isClickable);
            });
        });
    }

    function drawTriangle(x1, y1, x2, y2, x3, y3, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x3, y3);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
        var rot = Math.PI / 2 * 3;
        var x = cx, y = cy;
        var step = Math.PI / spikes;
        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);
        for(i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outerRadius;
            y = cy + Math.sin(rot) * outerRadius;
            ctx.lineTo(x, y);
            rot += step;
            x = cx + Math.cos(rot) * innerRadius;
            y = cy + Math.sin(rot) * innerRadius;
            ctx.lineTo(x, y);
            rot += step;
        }
        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
    }

    function drawPiece(x, y, color, highlight) {
        // Skugga
        ctx.beginPath();
        ctx.arc(x, y + 2, 14, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fill();

        // Pjäs
        ctx.beginPath();
        ctx.arc(x, y, 14, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#fff';
        ctx.stroke();
        
        // Inre ljuspunkt (för 3D känsla)
        ctx.beginPath();
        ctx.arc(x - 4, y - 4, 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();

        if (highlight) {
            // Pulserande vit kant om den går att flytta
            let time = Date.now() / 150;
            ctx.beginPath();
            ctx.arc(x, y, 18 + Math.sin(time)*2, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
    }

    // --- Spel Logik ---
    
    function rollDice() {
        if (gameState !== 'WAITING_FOR_ROLL') return;
        
        gameState = 'ROLLING';
        let diceEl = document.getElementById('dice');
        diceEl.classList.add('rolling');
        showMessage("Rullar...");

        let rollCount = 0;
        let rollInterval = setInterval(() => {
            let tempVal = Math.floor(Math.random() * 6);
            diceEl.textContent = DICE_FACES[tempVal];
            rollCount++;
            if(rollCount > 10) {
                clearInterval(rollInterval);
                diceValue = Math.floor(Math.random() * 6) + 1; // 1-6
                diceEl.textContent = DICE_FACES[diceValue - 1];
                diceEl.classList.remove('rolling');
                evaluateMoves();
            }
        }, 50);
    }

    function evaluateMoves() {
        let player = players[currentTurn];
        let hasValidMoves = false;

        player.pieces.forEach(p => {
            if (isValidMove(p)) {
                hasValidMoves = true;
            }
        });

        if (!hasValidMoves) {
            showMessage(`Du slog ${diceValue}. Inga möjliga drag!`);
            gameState = 'ANIMATING'; // Blockerar klick
            setTimeout(() => {
                nextTurn();
            }, 1500);
        } else {
            showMessage(`Du slog ${diceValue}. Välj en pjäs!`);
            gameState = 'WAITING_FOR_MOVE';
        }
    }

    function isValidMove(piece) {
        if (piece.progress === 0 && diceValue !== 6) return false; // Måste ha 6a för att gå ut
        if (piece.progress === 57) return false; // Redan i mål
        return true;
    }

    // --- Klick på canvas ---
    canvas.addEventListener('mousedown', (e) => {
        if (gameState !== 'WAITING_FOR_MOVE') return;

        let rect = canvas.getBoundingClientRect();
        // Skala koordinater utifall canvas är stylad mindre
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        
        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;

        let player = players[currentTurn];
        
        for (let i = 0; i < player.pieces.length; i++) {
            let p = player.pieces[i];
            if (!isValidMove(p)) continue;

            // Avstånd från mus till ritad pjäs
            let dx = mouseX - p.renderX;
            let dy = mouseY - p.renderY;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 20) {
                // Träff! Flytta denna.
                startPieceAnimation(p);
                break;
            }
        }
    });

    function startPieceAnimation(piece) {
        gameState = 'ANIMATING';
        animatingPiece = piece;
        activePath = [];
        activePathProgress = [];

        let currentProg = piece.progress;
        
        if (currentProg === 0) {
            // Går ut från bas
            activePath.push(getRawCoordinates(piece.playerIdx, piece.id, 1));
            activePathProgress.push(1);
        } else {
            // Generera path steg för steg (hantera studs)
            let bounce = false;
            let tempProg = currentProg;
            for (let i = 0; i < diceValue; i++) {
                if (tempProg === 57) bounce = true;
                
                if (bounce) tempProg--;
                else tempProg++;
                
                activePath.push(getRawCoordinates(piece.playerIdx, piece.id, tempProg));
                activePathProgress.push(tempProg);
            }
        }

        pathStep = 0;
        showMessage("Flyttar...");
    }

    function handleMoveEnd() {
        let piece = animatingPiece;
        let finalProg = piece.progress;
        animatingPiece = null;

        // Kolla Knuff!
        let knuffOcurred = false;
        if (finalProg >= 1 && finalProg <= 51) {
            let targetTrackIdx = (players[piece.playerIdx].startOffset + finalProg - 1) % 52;
            
            // Loopa motståndares pjäser
            players.forEach(opp => {
                if (opp.id !== piece.playerIdx) {
                    opp.pieces.forEach(oppPiece => {
                        if (oppPiece.progress >= 1 && oppPiece.progress <= 51) {
                            let oppTrackIdx = (opp.startOffset + oppPiece.progress - 1) % 52;
                            if (oppTrackIdx === targetTrackIdx) {
                                // KNUFF! Skicka hem.
                                oppPiece.progress = 0;
                                let baseC = getRawCoordinates(opp.id, oppPiece.id, 0);
                                oppPiece.x = baseC.x;
                                oppPiece.y = baseC.y;
                                knuffOcurred = true;
                            }
                        }
                    });
                }
            });
        }

        if (knuffOcurred) {
            showMessage("KNUFF!");
            setTimeout(checkWinCondition, 1000);
        } else if (finalProg === 57) {
            showMessage("MÅL!");
            setTimeout(checkWinCondition, 1000);
        } else {
            checkWinCondition();
        }
    }

    function checkWinCondition() {
        let player = players[currentTurn];
        let won = player.pieces.every(p => p.progress === 57);
        
        if (won) {
            gameState = 'GAME_OVER';
            showMessage(`${player.name} VANN SPELET! 🎉`);
        } else {
            if (diceValue === 6) {
                showMessage("Extra slag!");
                gameState = 'WAITING_FOR_ROLL';
            } else {
                nextTurn();
            }
        }
    }

    function nextTurn() {
        currentTurn = (currentTurn + 1) % 4;
        gameState = 'WAITING_FOR_ROLL';
        updateUI();
        showMessage(`${players[currentTurn].name}s tur.`);
    }

    function updateUI() {
        let p = players[currentTurn];
        let indicator = document.getElementById('turn-indicator');
        indicator.textContent = `${p.name} Spelares Tur`;
        indicator.style.backgroundColor = p.color;
        indicator.style.color = p.textColor;
        
        let diceEl = document.getElementById('dice');
        diceEl.textContent = '\u2680'; // Reset visually
    }

    function showMessage(msg) {
        document.getElementById('msg-box').innerHTML = msg;
    }

    // --- Huvudloop för animationer ---
    function gameLoop() {
        // Uppdatera position if animating
        if (animatingPiece && activePath.length > 0) {
            let target = activePath[pathStep];
            let dx = target.x - animatingPiece.x;
            let dy = target.y - animatingPiece.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            let speed = 8; // Pixel per frame

            if (dist < speed) {
                // Nått steget
                animatingPiece.x = target.x;
                animatingPiece.y = target.y;
                animatingPiece.progress = activePathProgress[pathStep];
                pathStep++;

                if (pathStep >= activePath.length) {
                    // Animation färdig
                    handleMoveEnd();
                }
            } else {
                // Rör dig
                animatingPiece.x += (dx / dist) * speed;
                animatingPiece.y += (dy / dist) * speed;
            }
        }

        drawBoard();
        requestAnimationFrame(gameLoop);
    }

    // Starta spelet!
    initGame();

</script>

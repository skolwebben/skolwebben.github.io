<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maneten i Djupet</title>
    <!-- Tailwind CSS för snygg och modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Förhindrar skrollning när man använder touch-knapparna på mobilen */
        body {
            touch-action: pan-y; 
            overflow-y: hidden;
            background-color: #020617; /* Mycket mörk blå/svart */
        }
        canvas {
            /* Mjuk rendering för vattenkänsla */
            image-rendering: auto; 
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans selection:bg-cyan-500 selection:text-white">

    <div class="max-w-md w-full space-y-4">
        <!-- Header / Poängtavla -->
        <div class="flex justify-between items-end px-2">
            <div>
                <h1 class="text-3xl font-bold text-cyan-400 tracking-wider drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">DJUPET</h1>
                <p class="text-cyan-200/70 text-sm">Ät gult plankton, undvik vit plast!</p>
            </div>
            <div class="text-right">
                <span class="text-cyan-500/80 text-sm uppercase tracking-widest block mb-1">Poäng</span>
                <span id="scoreDisplay" class="text-3xl font-mono font-bold text-white glass-panel px-4 py-1 rounded-lg">0</span>
            </div>
        </div>

        <!-- Spelområde (Canvas Container) -->
        <div class="relative w-full aspect-[4/5] glass-panel rounded-2xl shadow-[0_0_40px_rgba(6,182,212,0.15)] overflow-hidden ring-1 ring-cyan-900/50">
            <!-- Själva ritytan (högre upplösning internt för skärpa) -->
            <canvas id="gameCanvas" width="800" height="1000" class="block w-full h-full"></canvas>
            
            <!-- Start/Game Over Overlay -->
            <div id="overlay" class="absolute inset-0 bg-slate-950/80 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center transition-opacity duration-500 z-10">
                <div class="w-24 h-24 mb-4 relative animate-bounce">
                    <!-- Enkel manet-ikon i CSS/SVG -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]">
                        <path d="M12 2C7.58 2 4 5.58 4 10v2h16v-2c0-4.42-3.58-8-8-8z"></path>
                        <path d="M5 12v4c0 1.1.9 2 2 2s2-.9 2-2v-4"></path>
                        <path d="M10 12v5c0 1.1.9 2 2 2s2-.9 2-2v-5"></path>
                        <path d="M15 12v4c0 1.1.9 2 2 2s2-.9 2-2v-4"></path>
                    </svg>
                </div>
                <h2 id="overlayTitle" class="text-4xl font-bold text-cyan-400 mb-2 drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">Simma!</h2>
                <p id="overlayText" class="text-slate-300 mb-8 max-w-[250px]">Använd piltangenterna eller knapparna för att simma. Havet är fullt av faror.</p>
                <button id="startBtn" class="bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 px-8 rounded-full text-lg transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.4)] border border-cyan-400/30">
                    Dyk i
                </button>
            </div>
        </div>

        <!-- Mobila kontroller -->
        <div class="grid grid-cols-3 gap-2 p-4 glass-panel rounded-2xl mx-auto max-w-[280px] md:opacity-50 md:hover:opacity-100 transition-opacity">
            <div class="col-start-2">
                <button id="btnUp" class="control-btn w-full aspect-square bg-slate-800/80 hover:bg-slate-700 active:bg-cyan-600 rounded-xl flex items-center justify-center text-cyan-400 transition-colors border border-slate-600/50">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                </button>
            </div>
            <div class="col-start-1 row-start-2">
                <button id="btnLeft" class="control-btn w-full aspect-square bg-slate-800/80 hover:bg-slate-700 active:bg-cyan-600 rounded-xl flex items-center justify-center text-cyan-400 transition-colors border border-slate-600/50">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
            </div>
            <div class="col-start-3 row-start-2">
                <button id="btnRight" class="control-btn w-full aspect-square bg-slate-800/80 hover:bg-slate-700 active:bg-cyan-600 rounded-xl flex items-center justify-center text-cyan-400 transition-colors border border-slate-600/50">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
            <div class="col-start-2 row-start-3">
                <button id="btnDown" class="control-btn w-full aspect-square bg-slate-800/80 hover:bg-slate-700 active:bg-cyan-600 rounded-xl flex items-center justify-center text-cyan-400 transition-colors border border-slate-600/50">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </button>
            </div>
        </div>
        
    </div>

    <script>
        // DOM Element
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayText = document.getElementById('overlayText');
        const startBtn = document.getElementById('startBtn');

        // Spelkonstanter
        const width = canvas.width;
        const height = canvas.height;
        let animationFrameId;
        let isGameRunning = false;
        let score = 0;
        let gameSpeedMultiplier = 1;

        // Kontroll-status
        const keys = {
            up: false,
            down: false,
            left: false,
            right: false
        };

        // --- Spelobjekt ---

        // Maneten (Spelaren)
        const player = {
            x: width / 2,
            y: height / 2,
            vx: 0,
            vy: 0,
            radius: 30,
            speed: 0.8,      // Minskad från 1.5 - Hur starkt maneten simmar
            friction: 0.94,  // Ökad från 0.92 - Lite mer glid/vattenmotstånd
            pulseTime: 0,    // För animation
            
            draw() {
                // Rörelseanimation (puls)
                this.pulseTime += 0.1;
                const pulse = Math.sin(this.pulseTime) * 0.15;
                const currentRadius = this.radius * (1 + pulse);
                const tentacleLength = 50 + (pulse * 20);

                ctx.save();
                ctx.translate(this.x, this.y);

                // Luta maneten lite baserat på hastighet i X-led
                ctx.rotate(this.vx * 0.05);

                // Självlysande effekt (Glow)
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#a855f7'; // Lila glöd (blandning av blått och rosa)

                // Rita tentakler
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                
                for(let i = -1; i <= 1; i++) {
                    // Sätt tentakelns färg baserat på dess position (Blå vänster, Lila mitten, Rosa höger)
                    if (i === -1) ctx.strokeStyle = 'rgba(59, 130, 246, 0.7)'; // Blå
                    else if (i === 0) ctx.strokeStyle = 'rgba(168, 85, 247, 0.7)'; // Lila
                    else ctx.strokeStyle = 'rgba(236, 72, 153, 0.7)'; // Rosa

                    ctx.beginPath();
                    ctx.moveTo(i * 15, 10);
                    // Beräkna svajande tentakler baserat på tid och hastighet
                    const sway = Math.sin(this.pulseTime + i) * 10 - this.vx * 2;
                    ctx.quadraticCurveTo(i * 20 + sway, tentacleLength / 2, i * 15 + sway * 1.5, tentacleLength - this.vy * 2);
                    ctx.stroke();
                }

                // Rita manetens "klocka" (kroppen)
                // Skapa en övergångsfärg (gradient) från blått till rosa
                const bodyGradient = ctx.createLinearGradient(-currentRadius, 0, currentRadius, 0);
                bodyGradient.addColorStop(0, 'rgba(59, 130, 246, 0.8)'); // Blå på vänster sida
                bodyGradient.addColorStop(1, 'rgba(236, 72, 153, 0.8)'); // Rosa på höger sida
                
                ctx.fillStyle = bodyGradient;
                ctx.beginPath();
                // En halvcirkel
                ctx.arc(0, -5, currentRadius, Math.PI, 0);
                // Vågig botten
                ctx.quadraticCurveTo(currentRadius/2, 5 + pulse*10, 0, -5);
                ctx.quadraticCurveTo(-currentRadius/2, 5 + pulse*10, -currentRadius, -5);
                ctx.fill();

                // Liten inre lysande kärna
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.arc(0, -15, currentRadius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            },
            
            update() {
                // Applicera kraft om tangenter trycks ned
                if (keys.up) this.vy -= this.speed;
                if (keys.down) this.vy += this.speed;
                if (keys.left) this.vx -= this.speed;
                if (keys.right) this.vx += this.speed;

                // Naturligt sjunkande i vattnet om man inte simmar uppåt
                this.vy += 0.12; // Minskad från 0.2 så den inte sjunker som en sten när den är långsammare

                // Vattenmotstånd (Friction)
                this.vx *= this.friction;
                this.vy *= this.friction;

                // Uppdatera position
                this.x += this.vx;
                this.y += this.vy;

                // Håll maneten inom skärmen
                if (this.x < this.radius) { this.x = this.radius; this.vx = 0; }
                if (this.x > width - this.radius) { this.x = width - this.radius; this.vx = 0; }
                if (this.y < this.radius) { this.y = this.radius; this.vy = 0; }
                if (this.y > height - this.radius) { this.y = height - this.radius; this.vy = 0; }
            }
        };

        // Listor för objekt
        let foods = [];
        let enemies = [];
        let bubbles = [];

        // Funktioner för att skapa objekt
        function createFood() {
            foods.push({
                x: width + 50,
                y: Math.random() * (height - 100) + 50,
                radius: 8,
                speed: (Math.random() * 2 + 1) * gameSpeedMultiplier,
                pulse: Math.random() * Math.PI * 2
            });
        }

        function createEnemy() {
            enemies.push({
                x: width + 50,
                y: Math.random() * (height - 100) + 50,
                radius: 25, // Kollisionsradie
                speed: (Math.random() * 3 + 2) * gameSpeedMultiplier,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.05,
                drift: Math.random() * Math.PI * 2 // För rörelse i y-led
            });
        }

        function createBubble(isInitial = false) {
            bubbles.push({
                x: Math.random() * width,
                y: isInitial ? Math.random() * height : height + 20,
                radius: Math.random() * 6 + 2,
                speed: Math.random() * 2 + 1,
                sway: Math.random() * Math.PI * 2
            });
        }

        // --- Spellogik ---

        function initGame() {
            // Återställ spelaren
            player.x = width / 4;
            player.y = height / 2;
            player.vx = 0;
            player.vy = 0;

            // Återställ variabler
            score = 0;
            gameSpeedMultiplier = 1;
            scoreDisplay.textContent = score;
            foods = [];
            enemies = [];
            bubbles = [];

            // Skapa initiala bubblor
            for(let i=0; i<30; i++) createBubble(true);

            // Göm overlay och starta loop
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 500); // Vänta på CSS transition

            isGameRunning = true;
            cancelAnimationFrame(animationFrameId);
            gameLoop();
        }

        function checkCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < (obj1.radius + obj2.radius * 0.8); // 0.8 gör hitboxen lite mer förlåtande
        }

        function gameOver() {
            isGameRunning = false;
            overlayTitle.textContent = "Förgiftad!";
            overlayTitle.classList.replace('text-cyan-400', 'text-red-500');
            overlayTitle.classList.replace('drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]', 'drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]');
            
            overlayText.textContent = `Du samlade ${score} plankton innan du fastnade i plasten. Skydda våra hav!`;
            startBtn.textContent = "Dyk i igen";
            
            overlay.classList.remove('hidden');
            // Timeout för att säkerställa att transitionen triggas efter display:block
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 10);
        }

        function update() {
            player.update();

            // Öka spelets svårighetsgrad långsamt
            gameSpeedMultiplier += 0.0005;

            // Spawna plankton (Mat)
            if (Math.random() < 0.03) createFood();
            
            // Spawna plast (Fiender) - Oftare ju högre poäng
            const enemySpawnRate = 0.015 + (score * 0.001);
            if (Math.random() < Math.min(enemySpawnRate, 0.06)) createEnemy();

            // Spawna bubblor
            if (Math.random() < 0.1) createBubble();

            // Uppdatera Mat
            for (let i = foods.length - 1; i >= 0; i--) {
                let f = foods[i];
                f.x -= f.speed;
                f.pulse += 0.1;

                // Kollision med spelare
                if (checkCollision(player, f)) {
                    score += 1;
                    scoreDisplay.textContent = score;
                    foods.splice(i, 1);
                    continue;
                }

                // Ta bort om utanför skärmen
                if (f.x < -20) foods.splice(i, 1);
            }

            // Uppdatera Fiender
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.x -= e.speed;
                e.rotation += e.rotSpeed;
                e.drift += 0.02;
                e.y += Math.sin(e.drift) * 1.5; // Flyter upp och ner

                // Kollision med spelare
                if (checkCollision(player, e)) {
                    gameOver();
                    return;
                }

                if (e.x < -50) enemies.splice(i, 1);
            }

            // Uppdatera Bubblor
            for (let i = bubbles.length - 1; i >= 0; i--) {
                let b = bubbles[i];
                b.y -= b.speed;
                b.sway += 0.05;
                b.x += Math.sin(b.sway) * 1;

                if (b.y < -20) bubbles.splice(i, 1);
            }
        }

        function draw() {
            // 1. Rita Bakgrund (Djuphavs-gradient)
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0c4a6e');   // Ljusare blå upptill (Tailwind sky-900)
            gradient.addColorStop(1, '#020617');   // Nästan svart nertill (Tailwind slate-950)
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 2. Rita Bakgrundsbubblor
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.shadowBlur = 0;
            bubbles.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // 3. Rita Mat (Plankton)
            foods.forEach(f => {
                const currentRadius = f.radius + Math.sin(f.pulse) * 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fef08a'; // Gul/grön
                ctx.fillStyle = '#fde047'; 
                ctx.beginPath();
                ctx.arc(f.x, f.y, currentRadius, 0, Math.PI * 2);
                ctx.fill();
            });

            // 4. Rita Fiender (Plastpåsar)
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
            ctx.fillStyle = 'rgba(241, 245, 249, 0.7)'; // Halvgenomskinlig vit/grå
            ctx.strokeStyle = 'rgba(203, 213, 225, 0.5)';
            ctx.lineWidth = 2;

            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(e.rotation);
                
                // Rita en oregelbunden form som liknar skrynklig plast
                ctx.beginPath();
                ctx.moveTo(-15, -20);
                ctx.lineTo(5, -25);
                ctx.lineTo(20, -10);
                ctx.lineTo(15, 15);
                ctx.lineTo(-5, 25);
                ctx.lineTo(-20, 5);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Några inre linjer för att se ut som veck
                ctx.beginPath();
                ctx.moveTo(-10, -10);
                ctx.lineTo(10, 10);
                ctx.moveTo(5, -15);
                ctx.lineTo(-5, 15);
                ctx.stroke();
                
                ctx.restore();
            });

            // 5. Rita Spelaren (Maneten)
            player.draw();
        }

        // Huvudloopen
        function gameLoop() {
            if (!isGameRunning) return;

            update();
            if(!isGameRunning) return; // Om vi dog i update()
            draw();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // --- Kontroller och Event Listeners ---

        // Startknapp
        startBtn.addEventListener('click', initGame);

        // Tangentbord
        document.addEventListener('keydown', (e) => {
            if (["ArrowUp", "w", "W"].includes(e.key)) keys.up = true;
            if (["ArrowDown", "s", "S"].includes(e.key)) keys.down = true;
            if (["ArrowLeft", "a", "A"].includes(e.key)) keys.left = true;
            if (["ArrowRight", "d", "D"].includes(e.key)) keys.right = true;
            
            // Förhindra skrollning med pilar
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", " "].includes(e.key)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (["ArrowUp", "w", "W"].includes(e.key)) keys.up = false;
            if (["ArrowDown", "s", "S"].includes(e.key)) keys.down = false;
            if (["ArrowLeft", "a", "A"].includes(e.key)) keys.left = false;
            if (["ArrowRight", "d", "D"].includes(e.key)) keys.right = false;
        });

        // Touch-kontroller för mobil
        const setupTouchControl = (btnId, keyName) => {
            const btn = document.getElementById(btnId);
            const startEvent = (e) => {
                e.preventDefault();
                keys[keyName] = true;
            };
            const endEvent = (e) => {
                e.preventDefault();
                keys[keyName] = false;
            };
            
            btn.addEventListener('touchstart', startEvent, {passive: false});
            btn.addEventListener('touchend', endEvent);
            btn.addEventListener('mousedown', startEvent);
            btn.addEventListener('mouseup', endEvent);
            btn.addEventListener('mouseleave', endEvent);
        };

        setupTouchControl('btnUp', 'up');
        setupTouchControl('btnDown', 'down');
        setupTouchControl('btnLeft', 'left');
        setupTouchControl('btnRight', 'right');

        // Rita ut bakgrunden en gång innan spelet startas för en snygg startskärm
        for(let i=0; i<30; i++) createBubble(true);
        draw();

    </script>
</body>
</html>

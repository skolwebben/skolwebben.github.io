<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15x13 Perfect Path Rewind Snake</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2b2b2b;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .game-wrapper {
            background-color: white;
            padding: 8px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }

        .score-board {
            background-color: white;
            color: black;
            font-size: 24px;
            font-weight: bold;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-box {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        canvas {
            display: block;
        }

        .game-over-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .game-over-box {
            background-color: white;
            padding: 25px 60px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 80px;
        }

        .game-over-box h2 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 28px;
        }

        .final-score {
            font-size: 18px;
            color: #555;
            margin: 0 0 10px 0;
            font-weight: 500;
        }

        .final-highscore {
            font-size: 20px;
            color: #333;
            font-weight: bold;
            margin: 0 0 25px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .game-over-box button {
            padding: 10px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .game-over-box button:hover {
            background-color: #1565c0;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="score-board">
            <div class="score-box">🍏 <span id="score">0</span></div>
            <div class="score-box">🏆 <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="600" height="520"></canvas>
        
        <div id="gameOverScreen" class="game-over-overlay">
            <div class="game-over-box">
                <h2>Du förlorade</h2>
                <div id="finalScoreDisplay" class="final-score">Du fick 0 🍏</div>
                <div id="finalHighScoreDisplay" class="final-highscore">Bästa: 0 🏆</div>
                <button onclick="restartGame()">starta om</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');
        const finalHighScoreDisplay = document.getElementById('finalHighScoreDisplay');

        // Konstanten för banan (15x13)
        const gridWidth = 15;
        const gridHeight = 13;
        const tileSize = 40; 
        const tickInterval = 130; 
        
        const fruitEmojis = ['🍎', '🍌', '🍐', '🍋'];

        // Spelvariabler
        let snake = [];
        let prevSnake = []; 
        let apples = [];
        
        let dx = 0;
        let dy = 0;
        let lastMoveDx = 1;
        let lastMoveDy = 0;
        
        let score = 0;
        let highScore = localStorage.getItem('snake_highscore') || 0;
        let gameStarted = false;
        let isGameOver = false;
        let inputQueue = [];
        let lastTickTime = 0;

        // Tryggt historiksystem för att förhindra krascher och hörn-klippning
        let historyStack = []; 
        let isAnimatingDeath = false;
        let deathStartTime = 0;
        const deathDuration = 1100; // Total tid för hela dödsförloppet

        // Sparade koordinater specifikt för krasch-ögonblicket
        let deathCrashPrev = [];
        let deathCrashCurrent = [];
        let deathDx = 0;
        let deathDy = 0;

        highScoreElement.textContent = highScore;

        function initGame() {
            gameOverScreen.style.display = 'none';
            isGameOver = false;
            isAnimatingDeath = false;

            snake = [
                { x: 3, y: 6 }, 
                { x: 2, y: 6 }, 
                { x: 1, y: 6 }  
            ];
            prevSnake = snake.map(seg => ({...seg}));

            // Förfyller stacken med startpositioner så att inga tomma fält kan krascha menyn
            const initialState = snake.map(seg => ({...seg}));
            historyStack = [
                { snake: initialState, prevSnake: initialState, dx: 1, dy: 0 },
                { snake: initialState, prevSnake: initialState, dx: 1, dy: 0 },
                { snake: initialState, prevSnake: initialState, dx: 1, dy: 0 },
                { snake: initialState, prevSnake: initialState, dx: 1, dy: 0 }
            ];

            apples = [
                { x: 11, y: 6, emoji: '🍎' }, 
                { x: 9, y: 3, emoji: '🍌' }, 
                { x: 9, y: 9, emoji: '🍐' }  
            ];

            dx = 0;
            dy = 0;
            lastMoveDx = 1;
            lastMoveDy = 0;
            score = 0;
            gameStarted = false;
            inputQueue = [];
            scoreElement.textContent = score;
            lastTickTime = performance.now();

            requestAnimationFrame(gameAnimationFrame);
        }

        function gameAnimationFrame(now) {
            if (isGameOver && !isAnimatingDeath) return;

            if (isAnimatingDeath) {
                let deathElapsed = now - deathStartTime;
                let deathProgress = deathElapsed / deathDuration;
                
                if (deathProgress >= 1) {
                    deathProgress = 1;
                    isAnimatingDeath = false;
                    showGameOverScreen();
                    return;
                }
                
                draw(1, true, deathProgress);
                requestAnimationFrame(gameAnimationFrame);
                return;
            }

            let elapsed = now - lastTickTime;

            if (gameStarted) {
                if (elapsed >= tickInterval) {
                    runLogicTick();
                    lastTickTime = now;
                    elapsed = 0;
                }
            } else {
                lastTickTime = now;
                elapsed = 0;
            }

            let progress = gameStarted ? elapsed / tickInterval : 0;
            if (progress > 1) progress = 1;

            draw(progress, false, 0);

            requestAnimationFrame(gameAnimationFrame);
        }

        function runLogicTick() {
            prevSnake = snake.map(seg => ({...seg}));

            if (inputQueue.length > 0) {
                let key = inputQueue.shift();
                if (key === 'w' && lastMoveDy !== 1) { dx = 0; dy = -1; }
                else if (key === 's' && lastMoveDy !== -1) { dx = 0; dy = 1; }
                else if (key === 'a' && lastMoveDx !== 1) { dx = -1; dy = 0; }
                else if (key === 'd' && lastMoveDx !== -1) { dx = 1; dy = 0; }
            }

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // Kolla krock mot vägg eller sig själv
            let crashed = false;
            if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) { crashed = true; }
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) { crashed = true; }
            }

            if (crashed) {
                isGameOver = true;
                isAnimatingDeath = true;
                deathStartTime = performance.now();

                // Sparar undan kraschtillståndet så att huvudet glider synligt in i hindret
                deathCrashPrev = snake.map(seg => ({...seg}));
                deathCrashCurrent = [head, ...snake.slice(0, snake.length - 1)];
                deathDx = dx !== 0 || dy !== 0 ? dx : lastMoveDx;
                deathDy = dx !== 0 || dy !== 0 ? dy : lastMoveDy;
                return;
            }

            if (dx !== 0 || dy !== 0) {
                lastMoveDx = dx;
                lastMoveDy = dy;
            }

            snake.unshift(head);

            let ateAppleIndex = -1;
            for (let i = 0; i < apples.length; i++) {
                if (head.x === apples[i].x && head.y === apples[i].y) {
                    ateAppleIndex = i;
                    break;
                }
            }

            if (ateAppleIndex !== -1) {
                score++;
                scoreElement.textContent = score;
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snake_highscore', highScore);
                    highScoreElement.textContent = highScore;
                }
                
                spawnApple(ateAppleIndex);
            } else {
                snake.pop();
            }

            // Spara lyckat steg i historik-stacken
            historyStack.unshift({
                snake: snake.map(seg => ({...seg})),
                prevSnake: prevSnake.map(seg => ({...seg})),
                dx: lastMoveDx,
                dy: lastMoveDy
            });
            if (historyStack.length > 10) historyStack.pop();
        }

        function showGameOverScreen() {
            finalScoreDisplay.textContent = "Du fick " + score + " 🍏";
            finalHighScoreDisplay.textContent = "Bästa: " + highScore + " 🏆";
            gameOverScreen.style.display = 'flex';
        }

        // Universell funktion för att hämta ormens punkter utan att gena i hörn
        function getSnakePoints(prev, current, progress) {
            let points = [];
            let headX = prev[0].x + (current[0].x - prev[0].x) * progress;
            let headY = prev[0].y + (current[0].y - prev[0].y) * progress;

            let tailX, tailY;
            let ateApple = current.length > prev.length;
            if (ateApple) {
                tailX = prev[prev.length - 1].x;
                tailY = prev[prev.length - 1].y;
            } else {
                let tailOld = prev[prev.length - 1];
                let tailNext = prev[prev.length - 2] || tailOld;
                tailX = tailOld.x + (tailNext.x - tailOld.x) * progress;
                tailY = tailOld.y + (tailNext.y - tailOld.y) * progress;
            }

            points.push({ x: tailX * tileSize + tileSize / 2, y: tailY * tileSize + tileSize / 2 });
            for (let i = prev.length - 2; i >= 0; i--) {
                points.push({ x: prev[i].x * tileSize + tileSize / 2, y: prev[i].y * tileSize + tileSize / 2 });
            }
            points.push({ x: headX * tileSize + tileSize / 2, y: headY * tileSize + tileSize / 2 });
            return points;
        }

        function draw(progress, isDeath, deathProgress) {
            // 1. Rita kartan
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#aad751' : '#a2d149';
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }

            // 2. Rita frukterna
            apples.forEach(fruit => {
                ctx.font = `${tileSize * 0.75}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(fruit.emoji, fruit.x * tileSize + tileSize / 2, fruit.y * tileSize + tileSize / 2);
            });

            // 3. Rita ormen
            if (snake.length > 0) {
                const size = tileSize * 0.7;
                let points = [];
                let currentDx = lastMoveDx;
                let currentDy = lastMoveDy;

                if (isDeath) {
                    // Tidslinje för faserna (Huvud in -> Spola tillbaka 2 rutor -> Studsa framåt)
                    if (deathProgress <= 0.20) {
                        // FAS 1: Åk framåt och penetrera hindret (0.0 till 0.20 i tid)
                        let p = deathProgress / 0.20;
                        points = getSnakePoints(deathCrashPrev, deathCrashCurrent, p);
                        currentDx = deathDx;
                        currentDy = deathDy;
                    } else if (deathProgress <= 0.50) {
                        // FAS 2a: Backa ut ur hindret (0.20 till 0.50)
                        let p = (deathProgress - 0.20) / 0.30;
                        points = getSnakePoints(deathCrashPrev, deathCrashCurrent, 1 - p);
                        currentDx = deathDx;
                        currentDy = deathDy;
                    } else if (deathProgress <= 0.80) {
                        // FAS 2b: Backa ytterligare 1 hel ruta bakåt (Totalt 2 rutor back från krasch)
                        let p = (deathProgress - 0.50) / 0.30;
                        points = getSnakePoints(historyStack[0].prevSnake, historyStack[0].snake, 1 - p);
                        currentDx = historyStack[0].dx;
                        currentDy = historyStack[0].dy;
                    } else {
                        // FAS 3: Åk framåt lite grann igen som en elastisk dämpning (0.80 till 1.0)
                        let p = (deathProgress - 0.80) / 0.20;
                        points = getSnakePoints(historyStack[0].prevSnake, historyStack[0].snake, p * 0.3); // Går till max 30% framåt
                        currentDx = historyStack[0].dx;
                        currentDy = historyStack[0].dy;
                    }
                } else {
                    // Normal mjuk och rut-låst framåtrörelse
                    points = getSnakePoints(prevSnake, snake, progress);
                    currentDx = lastMoveDx;
                    currentDy = lastMoveDy;
                }

                let headPx = points[points.length - 1].x;
                let headPy = points[points.length - 1].y;

                // Rita kroppslinjen
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.lineWidth = size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#2196f3';
                ctx.stroke();

                // Tungan 👅
                ctx.beginPath();
                let tongueLen = tileSize * 0.18;
                let forkLen = tileSize * 0.08;
                let edgeX = headPx + currentDx * (size / 2);
                let edgeY = headPy + currentDy * (size / 2);

                ctx.moveTo(edgeX, edgeY);
                if (currentDx === 1) {
                    ctx.lineTo(edgeX + tongueLen, edgeY);
                    ctx.lineTo(edgeX + tongueLen + forkLen, edgeY - forkLen / 1.5);
                    ctx.moveTo(edgeX + tongueLen, edgeY);
                    ctx.lineTo(edgeX + tongueLen + forkLen, edgeY + forkLen / 1.5);
                } else if (currentDx === -1) {
                    ctx.lineTo(edgeX - tongueLen, edgeY);
                    ctx.lineTo(edgeX - tongueLen - forkLen, edgeY - forkLen / 1.5);
                    ctx.moveTo(edgeX - tongueLen, edgeY);
                    ctx.lineTo(edgeX - tongueLen - forkLen, edgeY + forkLen / 1.5);
                } else if (currentDy === -1) {
                    ctx.lineTo(edgeX, edgeY - tongueLen);
                    ctx.lineTo(edgeX - forkLen / 1.5, edgeY - tongueLen - forkLen);
                    ctx.moveTo(edgeX, edgeY - tongueLen);
                    ctx.lineTo(edgeX + forkLen / 1.5, edgeY - tongueLen - forkLen);
                } else if (currentDy === 1) {
                    ctx.lineTo(edgeX, edgeY + tongueLen);
                    ctx.lineTo(edgeX - forkLen / 1.5, edgeY + tongueLen + forkLen);
                    ctx.moveTo(edgeX, edgeY + tongueLen);
                    ctx.lineTo(edgeX + forkLen / 1.5, edgeY + tongueLen + forkLen);
                }
                ctx.strokeStyle = '#e7471d'; 
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();

                // Huvudcirkel
                ctx.beginPath();
                ctx.arc(headPx, headPy, size / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#1976D2';
                ctx.fill();

                // Ögon
                ctx.fillStyle = 'white';
                const eyeRadius = size * 0.15;
                const eyeOffset = size * 0.25;
                let eye1x, eye1y, eye2x, eye2y;

                if (currentDx === 1) {
                    eye1x = headPx + eyeOffset / 1.5; eye1y = headPy - eyeOffset;
                    eye2x = headPx + eyeOffset / 1.5; eye2y = headPy + eyeOffset;
                } else if (currentDx === -1) {
                    eye1x = headPx - eyeOffset / 1.5; eye1y = headPy - eyeOffset;
                    eye2x = headPx - eyeOffset / 1.5; eye2y = headPy + eyeOffset;
                } else if (currentDy === -1) {
                    eye1x = headPx - eyeOffset; eye1y = headPy - eyeOffset / 1.5;
                    eye2x = headPx + eyeOffset; eye2y = headPy - eyeOffset / 1.5;
                } else {
                    eye1x = headPx - eyeOffset; eye1y = headPy + eyeOffset / 1.5;
                    eye2x = headPx + eyeOffset; eye2y = headPy + eyeOffset / 1.5;
                }

                ctx.beginPath(); ctx.arc(eye1x, eye1y, eyeRadius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(eye2x, eye2y, eyeRadius, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(eye1x + currentDx * 1.5, eye1y + currentDy * 1.5, eyeRadius * 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(eye2x + currentDx * 1.5, eye2y + currentDy * 1.5, eyeRadius * 0.5, 0, Math.PI * 2); ctx.fill();

                // Snurrande stjärnor ovanför huvudet vid krock
                if (isDeath) {
                    let angleOffset = deathProgress * Math.PI * 4; 
                    for (let k = 0; k < 3; k++) {
                        let angle = angleOffset + (k * Math.PI * 2 / 3);
                        let starX = headPx + Math.cos(angle) * (tileSize * 0.45);
                        let starY = headPy + Math.sin(angle) * (tileSize * 0.45);
                        drawStar(starX, starY, 5, tileSize * 0.14, tileSize * 0.06);
                    }
                }
            }
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx; let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius; y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y); rot += step;
                x = cx + Math.cos(rot) * innerRadius; y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y); rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fillStyle = '#ffeb3b'; 
            ctx.fill();
        }

        function spawnApple(index) {
            let isColliding;
            do {
                isColliding = false;
                apples[index].x = Math.floor(Math.random() * gridWidth);
                apples[index].y = Math.floor(Math.random() * gridHeight);
                apples[index].emoji = fruitEmojis[Math.floor(Math.random() * fruitEmojis.length)];
                
                for (let i = 0; i < snake.length; i++) {
                    if (snake[i].x === apples[index].x && snake[i].y === apples[index].y) {
                        isColliding = true; break;
                    }
                }
                for (let i = 0; i < apples.length; i++) {
                    if (i !== index && apples[i].x === apples[index].x && apples[i].y === apples[index].y) {
                        isColliding = true; break;
                    }
                }
            } while (isColliding);
        }

        function restartGame() {
            initGame();
        }

        document.addEventListener('keydown', function(e) {
            if (gameOverScreen.style.display === 'flex' || isAnimatingDeath) return;

            const key = e.key.toLowerCase();
            if (!['w', 'a', 's', 'd'].includes(key)) return;

            if (!gameStarted) {
                if (key === 'w') { dx = 0; dy = -1; }
                else if (key === 's') { dx = 0; dy = 1; }
                else if (key === 'a' && lastMoveDx !== 1) { dx = -1; dy = 0; }
                else if (key === 'd') { dx = 1; dy = 0; }
                
                gameStarted = true;
                lastTickTime = performance.now();
                runLogicTick(); 
                return;
            }

            let currentIntendedDx = dx;
            let currentIntendedDy = dy;
            if (inputQueue.length > 0) {
                let lastKey = inputQueue[inputQueue.length - 1];
                if (lastKey === 'w') { currentIntendedDx = 0; currentIntendedDy = -1; }
                if (lastKey === 's') { currentIntendedDx = 0; currentIntendedDy = 1; }
                if (lastKey === 'a') { currentIntendedDx = -1; currentIntendedDy = 0; }
                if (lastKey === 'd') { currentIntendedDx = 1; currentIntendedDy = 0; }
            }

            if (key === 'w' && currentIntendedDy === 1) return;
            if (key === 's' && currentIntendedDy === -1) return;
            if (key === 'a' && currentIntendedDx === 1) return;
            if (key === 'd' && currentIntendedDx === -1) return;

            if (inputQueue.length < 2 && key !== inputQueue[inputQueue.length - 1]) {
                inputQueue.push(key);
            }
        });

        initGame();
    </script>
</body>
</html>

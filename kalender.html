<!DOCTYPE html>
<html lang="sv">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Familjekalender 2026/2027</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
   <style>
       body {
           font-family: 'Inter', sans-serif;
           background-color: #ffffff;
           margin: 0;
           padding: 0;
           overflow: hidden; /* Förhindrar dubbla scrollbars, vi scrollar i kalender-kroppen */
       }
       ::-webkit-scrollbar {
           width: 6px;
       }
       ::-webkit-scrollbar-track {
           background: #f3f4f6;
       }
       ::-webkit-scrollbar-thumb {
           background: #d1d5db;
           border-radius: 3px;
       }
       ::-webkit-scrollbar-thumb:hover {
           background: #9ca3af;
       }
   </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">


   <div class="w-full max-w-6xl mx-auto flex flex-col h-full bg-white border-x border-gray-200">
      
       <!-- Header -->
       <div class="bg-slate-800 text-white p-3 md:p-4 text-center shrink-0">
           <h1 class="text-xl md:text-2xl font-bold tracking-tight">Årsplan 2026 / 2027</h1>
           <p class="text-slate-300 text-xs md:text-sm mt-0.5">Kalenderöversikt för Tove & Peter</p>
       </div>


       <!-- Legend (Förklaring) -->
       <div class="flex flex-wrap justify-center gap-4 md:gap-8 p-2 bg-gray-50 border-b border-gray-300 text-xs font-semibold shrink-0">
           <div class="flex items-center gap-2">
               <div class="w-4 h-4 rounded-sm border border-gray-300" style="background-color: #f9a8d4;"></div>
               Toves dagar
           </div>
           <div class="flex items-center gap-2">
               <div class="w-4 h-4 rounded-sm border border-gray-300" style="background-color: #5eead4;"></div>
               Peters dagar
           </div>
           <div class="flex items-center gap-2">
               <div class="w-4 h-4 rounded-sm border border-gray-300" style="background: linear-gradient(135deg, #f9a8d4 50%, #5eead4 50%);"></div>
               Bytesdag
           </div>
       </div>


       <!-- Scrollbar kalenderkropp -->
       <div id="calendar-body" class="overflow-y-auto flex-grow flex flex-col p-2 gap-3 md:p-4 md:gap-4 pb-10 bg-gray-100/40">
           <!-- Rader genereras här av JavaScript -->
       </div>


   </div>


   <script>
       // Data för hela kalenderåret
       // splitDay: 1=Mån, 2=Tis, 3=Ons, 4=Tor, 5=Fre, 6=Lör, 7=Sön
       const schedule = [
           { w: 15, y: 2026, owner: "Tove", nextOwner: "Peter", splitDay: 5, note: "10/4 till Peter", holiday: "" },
           { w: 16, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 17, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 18, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 19, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 20, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 21, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 22, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 23, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 24, y: 2026, owner: "Peter", note: "", holiday: "☀️ Sommarlov" },
           { w: 25, y: 2026, owner: "Peter", note: "", holiday: "☀️ Sommarlov" },
           { w: 26, y: 2026, owner: "Tove", note: "Byter i Helsingborg måndag/tisdag. 💍 Lerhamn/Bröllop", holiday: "☀️ Sommarlov" },
           { w: 27, y: 2026, owner: "Tove", note: "", holiday: "☀️ Sommarlov" },
           { w: 28, y: 2026, owner: "Peter", note: "Gotland/Elvira", holiday: "☀️ Sommarlov" },
           { w: 29, y: 2026, owner: "Peter", nextOwner: "Tove", splitDay: 4, note: "16/7 till Tove", holiday: "☀️ Sommarlov" },
           { w: 30, y: 2026, owner: "Tove", note: "", holiday: "☀️ Sommarlov" },
           { w: 31, y: 2026, owner: "Tove", nextOwner: "Peter", splitDay: 4, note: "30/7 till Peter", holiday: "☀️ Sommarlov" },
           { w: 32, y: 2026, owner: "Peter", note: "Gotland/Elvira", holiday: "☀️ Sommarlov" },
           { w: 33, y: 2026, owner: "Tove", note: "Peter jobbar denna vecka", holiday: "☀️ Sommarlov" },
           { w: 34, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 35, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 36, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 37, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 38, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 39, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 40, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 41, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 42, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 43, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 44, y: 2026, owner: "Tove", nextOwner: "Peter", splitDay: 4, note: "29/10 till Peter", holiday: "🍂 Höstlov" },
           { w: 45, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 46, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 47, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 48, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 49, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 50, y: 2026, owner: "Tove", note: "", holiday: "" },
           { w: 51, y: 2026, owner: "Peter", note: "", holiday: "" },
           { w: 52, y: 2026, owner: "Peter", nextOwner: "Tove", splitDay: 4, note: "24/12 16:00 till Tove", holiday: "🎄 Jullov" },
           { w: 53, y: 2026, owner: "Tove", note: "", holiday: "🎄 Jullov" },
           { w: 1, y: 2027, owner: "Peter", note: "", holiday: "🎄 Jullov" },
           { w: 2, y: 2027, owner: "Tove", note: "", holiday: "" },
           { w: 3, y: 2027, owner: "Peter", note: "", holiday: "" },
           { w: 4, y: 2027, owner: "Tove", note: "", holiday: "" },
           { w: 5, y: 2027, owner: "Peter", note: "", holiday: "" },
           { w: 6, y: 2027, owner: "Tove", note: "", holiday: "" },
           { w: 7, y: 2027, owner: "Peter", note: "", holiday: "" },
           { w: 8, y: 2027, owner: "Tove", note: "", holiday: "" },
           { w: 9, y: 2027, owner: "Peter", note: "", holiday: "⛷️ Sportlov" },
           { w: 10, y: 2027, owner: "Tove", note: "", holiday: "" },
           { w: 11, y: 2027, owner: "Peter", note: "", holiday: "" },
           { w: 12, y: 2027, owner: "Tove", note: "", holiday: "🐣 Påsk" },
           { w: 13, y: 2027, owner: "Tove", nextOwner: "Peter", splitDay: 5, note: "2/4 Peter", holiday: "🐣 Påsklov" },
           { w: 14, y: 2027, owner: "Peter", note: "", holiday:"" },
           { w: 15, y: 2027, owner: "Tove", note: "", holiday: "" },
           { w: 16, y: 2027, owner: "Peter", note: "", holiday: "" },
           { w: 17, y: 2027, owner: "Tove", note: "", holiday: "" },
           { w: 18, y: 2027, owner: "Peter", note: "", holiday: "" },
           { w: 19, y: 2027, owner: "Tove", note: "🎂 15/5 Coralinn firar födelsedag hos Peter", holiday: "" }
       ];


       // Få fram måndagens datum för en specifik ISO-vecka
       function getIsoWeekDate(w, y) {
           const jan4 = new Date(y, 0, 4);
           const jan4Day = jan4.getDay() || 7;
           const week1Monday = new Date(jan4);
           week1Monday.setDate(jan4.getDate() - jan4Day + 1);
          
           const targetMonday = new Date(week1Monday);
           targetMonday.setDate(week1Monday.getDate() + (w - 1) * 7);
           return targetMonday;
       }


       const monthsSv = ["jan", "feb", "mar", "apr", "maj", "jun", "jul", "aug", "sep", "okt", "nov", "dec"];
       const dayNamesShort = ['Må', 'Ti', 'On', 'To', 'Fr', 'Lö', 'Sö'];


       const colorTove = "#f9a8d4"; // Magenta/Rosa (Tailwind pink-300)
       const colorPeter = "#5eead4"; // Turkos (Tailwind teal-300)


       const tbody = document.getElementById('calendar-body');


       schedule.forEach(item => {
           const startDate = getIsoWeekDate(item.w, item.y);
          
           let daysHtml = '';
          
           // Loopa igenom veckans 7 dagar
           for(let i=0; i<7; i++) {
               let currentDate = new Date(startDate);
               currentDate.setDate(startDate.getDate() + i);
               let dateNum = currentDate.getDate();
               let monthStr = monthsSv[currentDate.getMonth()];
              
               let isTove = true;
               let isSplitDay = false;
               let splitGradient = "";


               if (!item.nextOwner) {
                   isTove = (item.owner === "Tove");
               } else {
                   if (i < item.splitDay - 1) {
                       isTove = (item.owner === "Tove");
                   } else if (i === item.splitDay - 1) {
                       isSplitDay = true;
                       let colorMorning = (item.owner === "Tove") ? colorTove : colorPeter;
                       let colorAfternoon = (item.nextOwner === "Tove") ? colorTove : colorPeter;
                       splitGradient = `linear-gradient(135deg, ${colorMorning} 50%, ${colorAfternoon} 50%)`;
                   } else {
                       isTove = (item.nextOwner === "Tove");
                   }
               }
              
               let bgStyle = isSplitDay ? `background: ${splitGradient};` : `background-color: ${isTove ? colorTove : colorPeter};`;
               let isBirthday = (dateNum === 14 && currentDate.getMonth() === 4); // 4 är index för maj (0-baserat)
              
               daysHtml += `
               <div class="py-2 relative flex flex-col items-center justify-center gap-0.5 border-r border-white/70 last:border-r-0 hover:brightness-95 transition-all" style="${bgStyle}">
                   ${isBirthday ? '<span class="absolute top-0.5 right-1 text-[10px] md:text-[12px] drop-shadow-sm" title="Coralinns födelsedag!">🎈</span>' : ''}
                   <span class="text-[9px] md:text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none">${dayNamesShort[i]}</span>
                   <span class="text-sm md:text-base font-extrabold text-slate-800 leading-none">${dateNum}</span>
                   <span class="text-[8px] md:text-[9px] text-slate-600 uppercase leading-none">${monthStr}</span>
               </div>
               `;
           }


           const card = document.createElement('div');
           card.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm shrink-0";
          
           let noteHtml = item.note ? `
               <div class="text-[10px] md:text-xs text-slate-700 bg-white px-1.5 py-0.5 rounded border border-gray-200 flex items-center gap-1">
                   <svg class="w-3 h-3 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                   <span class="truncate max-w-[150px] md:max-w-none">${item.note}</span>
               </div>` : '';
              
           let holidayHtml = item.holiday ? `
               <div class="text-[9px] md:text-[10px] font-bold px-1.5 py-0.5 rounded bg-yellow-50 text-yellow-700 border border-yellow-200 whitespace-nowrap">
                   ${item.holiday}
               </div>` : '';


           let ownerLabel = item.nextOwner ? `${item.owner} / ${item.nextOwner}` : item.owner;


           card.innerHTML = `
               <!-- Veckohuvud, tightare padding -->
               <div class="flex flex-wrap items-center gap-1.5 px-3 py-2 bg-gray-50 border-b border-gray-200">
                   <span class="bg-slate-700 text-white font-bold px-1.5 py-0.5 rounded text-[10px] md:text-xs">Vecka ${item.w}</span>
                   <span class="font-bold text-slate-700 text-[10px] md:text-xs uppercase tracking-wide mr-1">${ownerLabel}</span>
                   ${holidayHtml}
                   ${noteHtml ? `<div class="ml-auto">${noteHtml}</div>` : ''}
               </div>
              
               <!-- Dagarna, naturlig höjd baserad på padding och gap -->
               <div class="grid grid-cols-7">
                   ${daysHtml}
               </div>
           `;
          
           tbody.appendChild(card);
       });
   </script>
</body>
</html>
